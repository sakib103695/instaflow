# Instaflow nginx vhost.
#
# Place this at /etc/nginx/sites-available/instaflow on the VPS, then:
#
#   sudo ln -s /etc/nginx/sites-available/instaflow /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d instaflow.YOUR-DOMAIN
#
# certbot will rewrite this file to add the TLS block automatically.
# Replace `instaflow.YOUR-DOMAIN` with the real hostname before installing.

server {
    listen 80;
    listen [::]:80;
    server_name instaflow.YOUR-DOMAIN;

    # Larger client body for the scrape pipeline (manual content paste).
    client_max_body_size 5M;

    # Reverse proxy to the Instaflow Docker container on the host loopback.
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # The scraping endpoint can take 30-60s for big sites — give it room.
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 30s;

        # Don't buffer streaming responses.
        proxy_buffering off;
    }
}
